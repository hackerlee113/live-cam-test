<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時影像</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .cam-box {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        /* 讓 iframe 和 video 套用相同的樣式 */
        iframe, video {
            width: 480px;
            height: 320px;
            border: none;
            border-radius: 10px;
            display: block; /* 讓影像作為區塊顯示，避免多餘空白 */
            background-color: #000; /* 影片載入前的黑色背景 */
        }

        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: #0078D7;
            color: white;
            cursor: pointer;
            width: 100%; /* 讓按鈕寬度自動對齊影像寬度，視覺更整齊 */
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="cam-box">
            <video id="cam1" controls muted autoplay></video>
            <button onclick="playCam1()">撥放 (重整串流)</button>
        </div>

        <div class="cam-box">
            <iframe id="cam2" src="https://www.twipcam.com/cam/tao-000150"></iframe>
            <button onclick="reloadCam('cam2')">撥放</button>
        </div>

    </div>

    <script>
        // 設定 HLS 影片連結
        const videoSrc = "https://cctvatis1.ntpc.gov.tw/hls/C000020/live.m3u8";
        let hls;

        function setupHLS() {
            var video = document.getElementById('cam1');
            
            // 檢查瀏覽器是否支援 hls.js
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); // 如果已經有實例，先銷毀以防重複載入
                }
                hls = new Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // 針對原生支援 HLS 的瀏覽器 (如 Safari)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // 網頁載入完成後初始化 HLS 影片
        window.addEventListener('DOMContentLoaded', setupHLS);

        // 第一個攝影機的播放/重整按鈕邏輯
        function playCam1() {
            var video = document.getElementById('cam1');
            if (video.paused) {
                video.play();
            } else {
                // 如果已經在播放，點擊按鈕則重新連接串流
                setupHLS();
            }
        }

        // 第二個攝影機的重整邏輯 (維持不變)
        function reloadCam(camId) {
            var iframe = document.getElementById(camId);
            iframe.src = iframe.src;
        }
    </script>

</body>
</html>
