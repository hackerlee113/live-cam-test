<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全台即時影像監控</title>
    <style>
        /* 定義全域變數，方便日後修改主題顏色 */
        :root {
            --primary-color: #0078D7;
            --hover-color: #005fa3;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333333;
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", Arial, sans-serif;
            text-align: center;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .page-title {
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* 改用 Grid 或 Flex-wrap 來達成響應式排列 */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cam-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            max-width: 480px; /* 限制最大寬度，在電腦螢幕上不會無限放大 */
            box-sizing: border-box;
        }

        /* 加入懸浮特效，提升質感 */
        .cam-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .cam-title {
            margin: 0 0 12px 0;
            font-size: 18px;
            font-weight: bold;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 影片容器：利用 padding-bottom 保持 3:2 比例，讓 iframe 真正響應式 */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 66.66%; 
            border-radius: 8px;
            overflow: hidden;
            background-color: #e0e0e0;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        button {
            margin-top: 15px;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        /* 按下按鈕時的微小縮放回饋 */
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1 class="page-title">即時路況影像</h1>

    <main class="container">
        
        <section class="cam-box">
            <h2 class="cam-title">📷 新北即時影像</h2>
            <div class="video-wrapper">
                <iframe id="cam1" src="https://www.twipcam.com/cam/nwt-000020" title="新北即時影像" loading="lazy" allowfullscreen></iframe>
            </div>
            <button onclick="reloadCam('cam1')">↻ 重新載入</button>
        </section>

        <section class="cam-box">
            <h2 class="cam-title">📷 桃園即時影像</h2>
            <div class="video-wrapper">
                <iframe id="cam2" src="https://www.twipcam.com/cam/tao-000150" title="桃園即時影像" loading="lazy" allowfullscreen></iframe>
            </div>
            <button onclick="reloadCam('cam2')">↻ 重新載入</button>
        </section>

    </main>

    <script>
        function reloadCam(camId) {
            const iframe = document.getElementById(camId);
            if (iframe) {
                // 強制重新載入的保險作法：在 URL 後方加上時間戳記避免瀏覽器快取
                const url = new URL(iframe.src);
                url.searchParams.set('t', new Date().getTime());
                iframe.src = url.toString();
            }
        }
    </script>

</body>
</html>
